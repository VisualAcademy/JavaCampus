<!DOCTYPE html><html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{views/shared/_layout}"><head><title>도움말</title></head><body><div layout:fragment="content" class="container"><div class="page-intro mb-4"><h1 class="display-6 fw-semibold">도움말</h1><p class="text-secondary">JavaCampus(DevLec) 사용 중 자주 확인하는 연락처 예제와 컬렉션 출력 샘플을 하나의 화면으로 정리했습니다.</p></div><div class="row g-4"><div class="col-lg-5"><div class="card shadow-sm h-100"><div class="card-header fw-semibold">운영 연락처 예시</div><div class="card-body"><div class="table-responsive"><table class="table table-striped table-bordered align-middle mb-0"><thead class="table-light"><tr><th>구분</th><th>연락처</th></tr></thead><tbody><tr><td>학습 지원</td><td>02-2026-1004</td></tr><tr><td>프로젝트 문의</td><td>02-2026-2004</td></tr></tbody></table></div></div></div></div><div class="col-lg-7"><div class="card shadow-sm h-100"><div class="card-header fw-semibold">컨트롤러 전달 데이터</div><div class="card-body"><p class="text-secondary small">아래 목록은 서버에서 전달된 컬렉션을 Thymeleaf <code>th:each</code>로 반복 출력한 예시입니다.</p><div class="table-responsive"><table class="table table-hover table-bordered align-middle mb-0"><thead class="table-light"><tr><th>#</th><th>항목</th><th>전화번호</th></tr></thead><tbody><tr th:each="phone : ${phones}"><td th:text="${phone.id}"></td><td th:text="${phone.title}"></td><td th:text="${phone.phoneNumber}"></td></tr></tbody></table></div></div></div></div></div></div></body></html>
