<!DOCTYPE html><html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{views/shared/_layout}"><head><title>페이지 안내</title></head><body><div layout:fragment="content" class="container"><div class="row justify-content-center"><div class="col-xl-9"><div class="card shadow-sm"><div class="card-body p-5 text-center"><h1 class="display-6 fw-semibold mb-3">Pages 컨트롤러 안내</h1><p class="lead text-secondary mb-4">이 영역은 JavaCampus(DevLec)에서 단일 페이지 라우팅과 공통 레이아웃 적용 방식을 확인하기 위한 예제입니다.</p><div class="row g-3 text-start"><div class="col-md-4"><div class="border rounded p-3 h-100"><h2 class="h6">레이아웃 재사용</h2><p class="small text-secondary mb-0">페이지마다 헤더와 푸터를 반복하지 않고 공통 템플릿으로 처리합니다.</p></div></div><div class="col-md-4"><div class="border rounded p-3 h-100"><h2 class="h6">메뉴 연결</h2><p class="small text-secondary mb-0">상단 메뉴의 각 항목이 실제 렌더링 화면으로 이어지도록 구성했습니다.</p></div></div><div class="col-md-4"><div class="border rounded p-3 h-100"><h2 class="h6">2026 샘플 문구</h2><p class="small text-secondary mb-0">실제 학습 사이트처럼 자연스러운 한글 안내 문구로 내용을 정리했습니다.</p></div></div></div></div></div></div></div></body></html>
