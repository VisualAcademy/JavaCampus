<!DOCTYPE html><html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{views/shared/_layout}"><head><title>서비스 소개</title></head><body><div layout:fragment="content" class="container"><div class="page-intro mb-4"><h1 class="display-6 fw-semibold">서비스 소개</h1><p class="text-secondary">JavaCampus(DevLec)는 학습과 시연에 필요한 핵심 기능을 단순하고 이해하기 쉬운 형태로 제공합니다.</p></div><div class="row g-4"><div class="col-md-6 col-xl-3"><div class="card h-100 shadow-sm"><div class="card-body"><h2 class="h5">강의용 샘플</h2><p class="small text-secondary mb-0">수업이나 스터디에서 바로 설명할 수 있는 구조로 화면을 구성했습니다.</p></div></div></div><div class="col-md-6 col-xl-3"><div class="card h-100 shadow-sm"><div class="card-body"><h2 class="h5">실습형 CRUD</h2><p class="small text-secondary mb-0">등록, 수정, 삭제, 목록, 상세 보기 흐름을 통합적으로 확인할 수 있습니다.</p></div></div></div><div class="col-md-6 col-xl-3"><div class="card h-100 shadow-sm"><div class="card-body"><h2 class="h5">템플릿 레이아웃</h2><p class="small text-secondary mb-0">공통 헤더, 푸터, 콘텐츠 영역 분리를 통해 재사용성을 높였습니다.</p></div></div></div><div class="col-md-6 col-xl-3"><div class="card h-100 shadow-sm"><div class="card-body"><h2 class="h5">API 실습</h2><p class="small text-secondary mb-0">브라우저에서 바로 JSON을 열어 엔드포인트 구조를 확인할 수 있습니다.</p></div></div></div></div></div></body></html>
