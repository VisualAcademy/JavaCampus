<!DOCTYPE html><html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{views/shared/_layout}"><head><title>학습 가이드</title></head><body><div layout:fragment="content" class="container"><div class="page-intro mb-4"><h1 class="display-6 fw-semibold">학습 가이드</h1><p class="text-secondary">JavaCampus(DevLec)를 처음 실행한 뒤 어떤 화면부터 보면 좋은지 단계별로 정리했습니다.</p></div><div class="timeline vstack gap-3"><div class="card shadow-sm"><div class="card-body"><strong>1. 홈 화면 확인</strong><p class="mb-0 text-secondary">프로젝트의 전반적인 목적과 메뉴 구성을 먼저 파악합니다.</p></div></div><div class="card shadow-sm"><div class="card-body"><strong>2. CRUD 페이지 이동</strong><p class="mb-0 text-secondary">직원과 공지 관리 화면을 열어 입력 폼과 목록 구성을 확인합니다.</p></div></div><div class="card shadow-sm"><div class="card-body"><strong>3. API 비교</strong><p class="mb-0 text-secondary">동일한 데이터가 화면 렌더링과 JSON 응답에서 어떻게 표현되는지 비교해 봅니다.</p></div></div><div class="card shadow-sm"><div class="card-body"><strong>4. 템플릿 구조 학습</strong><p class="mb-0 text-secondary">공통 레이아웃, fragment, 각 개별 템플릿의 역할을 차례대로 살펴봅니다.</p></div></div></div></div></body></html>
